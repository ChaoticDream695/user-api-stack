version: "3.8"

services:
  database:
    image: postgres:18-alpine
    container_name: userapi-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres@L0calAdmin1234
      POSTGRES_DB: user_api_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network
  cache:
    image: redis:7-alpine
    container_name: userapi-cache
    ports:
    - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: userapi-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres%40L0calAdmin1234@database:5432/user_api_db
      REDIS_URL: redis://cache:6379
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
volumes:
  postgres-data:
  redis-data:
networks:
  app-network:
    driver: bridge